<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pac-Man HTML Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      margin: 20px 0 10px;
      color: yellow;
    }

    canvas {
      border: 4px solid blue;
      background: black;
    }

    #info {
      margin-top: 10px;
      font-size: 20px;
    }

    #controls {
      margin-top: 10px;
      color: #ccc;
    }
  </style>
</head>
<body>

<h1>PAC-MAN</h1>

<canvas id="game" width="420" height="420"></canvas>

<div id="info">
  Punteggio: <span id="score">0</span>
</div>

<div id="controls">
  Usa le frecce della tastiera per muoverti
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const tileSize = 20;
const rows = 21;
const cols = 21;

let score = 0;

const map = [
  "#####################",
  "#.........#.........#",
  "#.###.###.#.###.###.#",
  "#o###.###.#.###.###o#",
  "#...................#",
  "#.###.#.#####.#.###.#",
  "#.....#...#...#.....#",
  "#####.### # ###.#####",
  "    #.#       #.#    ",
  "#####.# ##-## #.#####",
  "     .  #GGG#  .     ",
  "#####.# ##### #.#####",
  "    #.#       #.#    ",
  "#####.# ##### #.#####",
  "#.........#.........#",
  "#.###.###.#.###.###.#",
  "#o..#...........#..o#",
  "###.#.#.#####.#.#.###",
  "#.....#...#...#.....#",
  "#.######### #########",
  "#####################"
];

const pacman = {
  x: 1,
  y: 1,
  dx: 0,
  dy: 0,
  radius: tileSize / 2 - 2
};

const ghosts = [
  { x: 10, y: 10, color: "red", dx: 1, dy: 0 },
  { x: 9, y: 10, color: "pink", dx: -1, dy: 0 }
];

function drawMap() {
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const tile = map[row][col];

      if (tile === "#") {
        ctx.fillStyle = "blue";
        ctx.fillRect(
          col * tileSize,
          row * tileSize,
          tileSize,
          tileSize
        );
      }

      if (tile === ".") {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(
          col * tileSize + tileSize / 2,
          row * tileSize + tileSize / 2,
          3,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      if (tile === "o") {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(
          col * tileSize + tileSize / 2,
          row * tileSize + tileSize / 2,
          6,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }
    }
  }
}

function drawPacman() {
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(
    pacman.x * tileSize + tileSize / 2,
    pacman.y * tileSize + tileSize / 2,
    pacman.radius,
    0.2 * Math.PI,
    1.8 * Math.PI
  );
  ctx.lineTo(
    pacman.x * tileSize + tileSize / 2,
    pacman.y * tileSize + tileSize / 2
  );
  ctx.fill();
}

function drawGhosts() {
  ghosts.forEach(g => {
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.arc(
      g.x * tileSize + tileSize / 2,
      g.y * tileSize + tileSize / 2,
      tileSize / 2 - 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function canMove(x, y) {
  return map[y][x] !== "#";
}

function movePacman() {
  const newX = pacman.x + pacman.dx;
  const newY = pacman.y + pacman.dy;

  if (canMove(newX, newY)) {
    pacman.x = newX;
    pacman.y = newY;
  }

  let row = map[pacman.y];
  if (row[pacman.x] === ".") {
    map[pacman.y] =
      row.substring(0, pacman.x) +
      " " +
      row.substring(pacman.x + 1);

    score += 10;
    document.getElementById("score").innerText = score;
  }
}

function moveGhosts() {
  ghosts.forEach(g => {
    const directions = [
      { dx: 1, dy: 0 },
      { dx: -1, dy: 0 },
      { dx: 0, dy: 1 },
      { dx: 0, dy: -1 }
    ];

    const possible = directions.filter(d =>
      canMove(g.x + d.dx, g.y + d.dy)
    );

    const dir = possible[Math.floor(Math.random() * possible.length)];

    g.dx = dir.dx;
    g.dy = dir.dy;

    g.x += g.dx;
    g.y += g.dy;
  });
}

function checkCollision() {
  ghosts.forEach(g => {
    if (g.x === pacman.x && g.y === pacman.y) {
      alert("Game Over!");
      location.reload();
    }
  });
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMap();
  movePacman();
  moveGhosts();
  checkCollision();

  drawPacman();
  drawGhosts();

  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e => {
  switch (e.key) {
    case "ArrowUp":
      pacman.dx = 0;
      pacman.dy = -1;
      break;

    case "ArrowDown":
      pacman.dx = 0;
      pacman.dy = 1;
      break;

    case "ArrowLeft":
      pacman.dx = -1;
      pacman.dy = 0;
      break;

    case "ArrowRight":
      pacman.dx = 1;
      pacman.dy = 0;
      break;
  }
});

gameLoop();
</script>

</body>
</html>
