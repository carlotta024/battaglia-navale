<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battaglia Navale</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#0f172a;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

h1{ margin-bottom:10px; }
p{ margin-top:0; }

.board{
    display:grid;
    grid-template-columns:repeat(10, 40px);
    grid-template-rows:repeat(10, 40px);
    gap:2px;
    background:#1e293b;
    padding:5px;
    border-radius:10px;
}

.cell{
    width:40px;
    height:40px;
    background:#334155;
    border-radius:4px;
    cursor:pointer;
}

.hit{ background:#ef4444 !important; }
.miss{ background:#38bdf8 !important; }

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

</style>
</head>

<body>

<h1>⚓ Battaglia Navale</h1>
<p>Trova e distruggi tutte le navi!</p>

<div id="enemy-board" class="board"></div>

<div id="message">Premi per iniziare</div>

<button onclick="startGame()">Nuova Partita</button>

<script>

// ======================
// CONFIG
// ======================
const SIZE = 10;
const SHIPS = [5,4,3,3,2];

let board = [];
let shipsLeft = 0;
let gameOver = false;

// ======================
// AUDIO 🎵
// ======================

// musica principale
const music = new Audio("./assets/musicasottofondo.wav");
music.loop = true;
music.volume = 0.2;

// seconda musica (più bassa, atmosfera)
const music2 = new Audio("https://raw.githubusercontent.com/carlotta024/battaglia-navale/main/assets/musicasottofondo.wav");
music2.loop = true;
music2.volume = 0.15;

// effetti
const hit = new Audio("./assets/colpirebarca.wav");
const water = new Audio("./assets/inacqua.wav");

hit.volume = 1.0;
water.volume = 1.0;

let musicStarted = false;

// ======================
// START MUSIC
// ======================
function startMusic(){
    if(!musicStarted){
        music.play().catch(()=>{});
        music2.play().catch(()=>{});
        musicStarted = true;
    }
}

// ======================
// CROSSFADE DINAMICO
// ======================
function crossfadeOnHit(){
    // abbassa principale
    music.volume = 0.2;

    // alza leggermente la seconda
    music2.volume = 0.35;

    setTimeout(() => {
        if(!gameOver){
            music.volume = 0.5;
            music2.volume = 0.15;
        }
    }, 900);
}

// ======================
// BOARD
// ======================
function createBoard(){
    return Array.from({length: SIZE}, () => Array(SIZE).fill(0));
}

function placeShips(){
    SHIPS.forEach(size => {
        let placed = false;

        while(!placed){
            const horizontal = Math.random() < 0.5;
            const r = Math.floor(Math.random() * SIZE);
            const c = Math.floor(Math.random() * SIZE);

            let ok = true;

            for(let i=0;i<size;i++){
                const rr = r + (horizontal ? 0 : i);
                const cc = c + (horizontal ? i : 0);

                if(rr >= SIZE || cc >= SIZE || board[rr][cc] !== 0){
                    ok = false;
                    break;
                }
            }

            if(ok){
                for(let i=0;i<size;i++){
                    const rr = r + (horizontal ? 0 : i);
                    const cc = c + (horizontal ? i : 0);
                    board[rr][cc] = 1;
                    shipsLeft++;
                }
                placed = true;
            }
        }
    });
}

// ======================
// RENDER
// ======================
function render(){
    const el = document.getElementById("enemy-board");
    el.innerHTML = "";

    board.forEach((row,r)=>{
        row.forEach((cell,c)=>{

            const div = document.createElement("div");
            div.className = "cell";

            if(cell === 2) div.classList.add("hit");
            if(cell === 3) div.classList.add("miss");

            div.onclick = () => attack(r,c);

            el.appendChild(div);
        });
    });
}

// ======================
// ATTACCO
// ======================
function attack(r,c){

    if(gameOver) return;

    if(board[r][c] === 2 || board[r][c] === 3){
        setMsg("Già colpito!");
        return;
    }

    startMusic();

    if(board[r][c] === 1){

        board[r][c] = 2;
        shipsLeft--;

        crossfadeOnHit();

        hit.currentTime = 0;
        hit.play().catch(()=>{});

        setMsg("💥 Colpito!");

        if(shipsLeft === 0){
            gameOver = true;
            music.pause();
            music2.pause();
            setMsg("🏆 Hai vinto!");
        }

    } else {

        board[r][c] = 3;

        crossfadeOnHit();

        water.currentTime = 0;
        water.play().catch(()=>{});

        setMsg("🌊 Acqua!");
    }

    render();
}

// ======================
// MSG
// ======================
function setMsg(t){
    document.getElementById("message").innerText = t;
}

// ======================
// START GAME
// ======================
function startGame(){

    board = createBoard();
    shipsLeft = 0;
    gameOver = false;

    placeShips();
    render();

    setMsg("Partita iniziata!");

    startMusic();
}

startGame();

</script>

</body>
</html>
