<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Battaglia Navale</title>

<style>

    *{
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        margin:0;
        background:#0f172a;
        color:white;
        display:flex;
        flex-direction:column;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    h1{
        margin-bottom:10px;
    }

    p{
        margin-top:0;
    }

    .game-container{
        display:flex;
        justify-content:center;
        margin-top:20px;
    }

    .board-wrapper{
        text-align:center;
    }

    .board{
        display:grid;
        grid-template-columns:repeat(10, 40px);
        grid-template-rows:repeat(10, 40px);
        gap:2px;
        background:#1e293b;
        padding:5px;
        border-radius:10px;
    }

    .cell{
        width:40px;
        height:40px;
        background:#334155;
        border-radius:4px;
        cursor:pointer;
        transition:0.2s;
    }

    .cell:hover{
        background:#475569;
    }

    /* Nave colpita */
    .hit{
        background:#ef4444 !important;
    }

    /* Acqua */
    .miss{
        background:#38bdf8 !important;
    }

    #message{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
    }

    button{
        margin-top:20px;
        padding:10px 20px;
        border:none;
        border-radius:8px;
        background:#22c55e;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#16a34a;
    }

</style>
</head>

<body>

<h1>⚓ Battaglia Navale</h1>

<p>Trova e distruggi tutte le navi nemiche!</p>

<div class="game-container">

    <div class="board-wrapper">

        <h2>Campo Nemico</h2>

        <div id="enemy-board" class="board"></div>

    </div>

</div>

<div id="message">Inizia la partita!</div>

<button onclick="restartGame()">Nuova Partita</button>

<script>

    // ======================================
    // CONFIGURAZIONE
    // ======================================

    const BOARD_SIZE = 10;

    // Dimensioni delle navi
    const SHIPS = [5,4,3,3,2];

    // ======================================
    // VARIABILI GIOCO
    // ======================================

    let enemyBoard = [];

    let enemyShips = 0;

    let gameOver = false;

    // ======================================
    // SUONI
    // ======================================

    // Suono acqua
    const waterSound = new Audio("assets/inacqua.wav");

    // Suono colpo nave
    const hitSound = new Audio("assets/colpirebarca.wav");

    // Musica di sottofondo
    const backgroundMusic = new Audio("assets/musicasottofondo.wav");

    // Impostazioni musica
    backgroundMusic.loop = true;
    backgroundMusic.volume = 0.5;

    // ======================================
    // CREA TABELLONE
    // ======================================

    function createBoard(){

        return Array.from({ length: BOARD_SIZE }, () =>
            Array(BOARD_SIZE).fill(0)
        );
    }

    // ======================================
    // POSIZIONA NAVI CASUALI
    // ======================================

    function placeShips(board){

        SHIPS.forEach(size => {

            let placed = false;

            while(!placed){

                const horizontal = Math.random() < 0.5;

                const row = Math.floor(Math.random() * BOARD_SIZE);

                const col = Math.floor(Math.random() * BOARD_SIZE);

                let fits = true;

                // Controllo spazio disponibile
                for(let i = 0; i < size; i++){

                    const r = row + (horizontal ? 0 : i);

                    const c = col + (horizontal ? i : 0);

                    if(
                        r >= BOARD_SIZE ||
                        c >= BOARD_SIZE ||
                        board[r][c] !== 0
                    ){
                        fits = false;
                        break;
                    }
                }

                // Posizionamento nave
                if(fits){

                    for(let i = 0; i < size; i++){

                        const r = row + (horizontal ? 0 : i);

                        const c = col + (horizontal ? i : 0);

                        board[r][c] = 1;

                        enemyShips++;
                    }

                    placed = true;
                }
            }
        });
    }

    // ======================================
    // DISEGNA TABELLONE
    // ======================================

    function renderBoard(){

        const boardElement = document.getElementById("enemy-board");

        boardElement.innerHTML = "";

        enemyBoard.forEach((row, r) => {

            row.forEach((cell, c) => {

                const div = document.createElement("div");

                div.classList.add("cell");

                // Nave colpita
                if(cell === 2){
                    div.classList.add("hit");
                }

                // Acqua
                if(cell === 3){
                    div.classList.add("miss");
                }

                // Evento click
                div.addEventListener("click", () => attack(r, c));

                boardElement.appendChild(div);

            });

        });

    }

    // ======================================
    // ATTACCO
    // ======================================

    function attack(r, c){

        // Se partita terminata
        if(gameOver) return;

        const cell = enemyBoard[r][c];

        // Casella già colpita
        if(cell === 2 || cell === 3){

            setMessage("Hai già colpito questa casella!");

            return;
        }

        // ======================================
        // NAVE COLPITA
        // ======================================

        if(cell === 1){

            enemyBoard[r][c] = 2;

            enemyShips--;

            // Riproduce suono colpo nave
            hitSound.currentTime = 0;

            hitSound.play().catch(error => {
                console.log("Errore audio hit:", error);
            });

            setMessage("💥 Nave colpita!");

            // Vittoria
            if(enemyShips === 0){

                // Ferma musica
                backgroundMusic.pause();

                setMessage("🏆 Hai distrutto tutte le navi!");

                gameOver = true;
            }

        }

        // ======================================
        // ACQUA
        // ======================================

        else{

            enemyBoard[r][c] = 3;

            // Riproduce suono acqua
            waterSound.currentTime = 0;

            waterSound.play().catch(error => {
                console.log("Errore audio acqua:", error);
            });

            setMessage("🌊 Acqua!");

        }

        renderBoard();
    }

    // ======================================
    // MESSAGGI
    // ======================================

    function setMessage(text){

        document.getElementById("message").innerText = text;
    }

    // ======================================
    // NUOVA PARTITA
    // ======================================

    function restartGame(){

        enemyBoard = createBoard();

        enemyShips = 0;

        gameOver = false;

        placeShips(enemyBoard);

        renderBoard();

        setMessage("Nuova partita iniziata!");

        // Riavvia musica
        backgroundMusic.pause();

        backgroundMusic.currentTime = 0;

        backgroundMusic.play().catch(error => {
            console.log("Errore musica:", error);
        });
    }

    // ======================================
    // AVVIO GIOCO
    // ======================================

    restartGame();

</script>

</body>
</html>
